name: Publicar site (GitHub Pages)

# Copia o conteudo do main para o branch gh-pages a cada mudanca.
# O GitHub Pages publica o site a partir do gh-pages automaticamente.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Atualizar o branch gh-pages
        run: git push origin HEAD:gh-pages --force
