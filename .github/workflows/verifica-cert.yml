name: Verificar certificado do dominio

on: workflow_dispatch

permissions:
  pages: read

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - name: Status oficial do Pages (API)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "== STATUS OFICIAL DO GITHUB PAGES =="
          curl -sS -H "Authorization: Bearer $GH_TOKEN" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/${{ github.repository }}/pages | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print('dominio:', d.get('cname')); print('status:', d.get('status')); print('https_enforced:', d.get('https_enforced')); c=d.get('https_certificate') or {}; print('certificado_estado:', c.get('state')); print('certificado_descricao:', c.get('description'))"
      - name: Testar HTTPS, certificado e DNS
        run: |
          echo "== STATUS HTTP =="
          curl -sS -o /dev/null -w "codigo: %{http_code}\n" https://mulherescuradas.institutoabner.com.br/ || echo "CONEXAO HTTPS FALHOU"
          echo "== DADOS DO CERTIFICADO SERVIDO =="
          echo | openssl s_client -connect mulherescuradas.institutoabner.com.br:443 -servername mulherescuradas.institutoabner.com.br 2>/dev/null | openssl x509 -noout -issuer -subject -dates || echo "CERTIFICADO AINDA NAO EMITIDO"
